<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Movie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0f;
      --surface: #16161a;
      --border:  #2a2a32;
      --accent:  #e8473f;
      --text:    #f0eee8;
      --muted:   #8a8794;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: #111;
    }

    .poster-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .card:hover .poster-wrap img { transform: scale(1.04); }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .card-body { padding: 22px 24px 26px; }

    .film-title {
      font-size: 1.35rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .film-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .film-desc {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .btn-play {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .btn-play:hover { opacity: .88; transform: translateY(-1px); }
    .btn-play:active { transform: translateY(0); }

    /* ── MODAL PLAYER ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      max-width: 900px;
      position: relative;
      box-shadow: 0 16px 60px rgba(0,0,0,.8);
      border: 1px solid var(--border);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color .2s;
      flex-shrink: 0;
    }

    .btn-close:hover { color: var(--text); }

    .player-box {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .player-box iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 14px;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .card { max-width: 100%; }
      .film-title { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">Watch<span>Movie</span></a>
</header>

<main>
  <div class="card">
    <div class="poster-wrap">
      <img src="https://image.tmdb.org/t/p/w500/placeholder.jpg" alt="Movie Poster" id="posterImg" />
      <div class="badge">Now Playing</div>
    </div>
    <div class="card-body">
      <div class="film-title" id="filmTitle">Movie Title Here</div>
      <div class="film-meta">
        <span id="filmYear">2025</span>
        <span id="filmGenre">Action · Drama</span>
        <span id="filmDuration">2h 15m</span>
      </div>
      <div class="film-desc" id="filmDesc">
        Write a short synopsis here. Max 2–3 sentences so it's not too long.
      </div>
      <button class="btn-play" id="btnPlay" onclick="handlePlayClick()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span id="btnPlayText">Watch Now</span>
      </button>
    </div>
  </div>
</main>

<footer>WatchMovie &mdash; built on Cloudflare Pages</footer>

<!-- ── MODAL PLAYER ── -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Movie Title</span>
      <button class="btn-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="player-box">
      <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
  </div>
</div>

<script>
  // ╔══════════════════════════════════════════════╗
  // ║  EDIT THIS SECTION FOR EACH NEW MOVIE         ║
  // ╠══════════════════════════════════════════════╣
  const FILM = {
    title:    "Toy Story 5",
    year:     "June 19, 2026",
    genre:    "animation, comedy, family.",
    duration: "1 hour 42 minutes",
    desc:     "“Toy Story 5” is a comedy-adventure animated film produced by Pixar Animation Studios and Walt Disney Pictures, scheduled to be released in theaters on June 19, 2026. This film is the fifth installment in the Toy Story franchise and reunites Woody, Buzz Lightyear, Jessie, and friends in a new story themed “Toy meets Tech,” in which the world of toys faces a threat from modern technology.",
    poster:   "https://i.imgur.com/fapVoD5.jpeg",
    embedUrl: "https://playmogo.com/d/zsc503tkxsb9",
  };
  // ╚══════════════════════════════════════════════╝

  // Inject movie data
  document.getElementById('filmTitle').textContent    = FILM.title;
  document.getElementById('filmYear').textContent     = FILM.year;
  document.getElementById('filmGenre').textContent    = FILM.genre;
  document.getElementById('filmDuration').textContent = FILM.duration;
  document.getElementById('filmDesc').textContent     = FILM.desc;
  document.getElementById('modalTitle').textContent   = FILM.title;
  document.getElementById('posterImg').src            = FILM.poster;
  document.getElementById('posterImg').alt            = FILM.title;

  const SMARTLINK = "https://www.effectivecpmnetwork.com/zw0ruk46?key=8a4737d043ffed9cff159d8d3a036306";
  const REQUIRED_CLICKS = 3;
  let clickCount = 0;

  function handlePlayClick() {
    clickCount++;

    if (clickCount < REQUIRED_CLICKS) {
      window.open(SMARTLINK, "_blank", "noopener");
      document.getElementById('btnPlayText').textContent = `Watch Now (${clickCount}/${REQUIRED_CLICKS})`;
    } else {
      // Last required click: open ad one more time AND unlock the player
      window.open(SMARTLINK, "_blank", "noopener");
      document.getElementById('btnPlayText').textContent = "Watch Now";
      openPlayer();
    }
  }

  function openPlayer() {
    document.getElementById('playerFrame').src = FILM.embedUrl;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closePlayer() {
    document.getElementById('playerFrame').src = '';
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
    clickCount = 0;
    document.getElementById('btnPlayText').textContent = "Watch Now";
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closePlayer();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePlayer();
  });
</script>
